spring:
  application:
    name: user-management

  datasource:
    # Cambia mysql por postgresql y el puerto 3306 por 5432 (puerto por defecto de Postgres)
    url: jdbc:postgresql://localhost:5432/user_management
    # El usuario por defecto en Postgres suele ser 'postgres'
    username: postgres
    # Pon la contraseña que configuraste al instalar PostgreSQL
    password: hsmcxz
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # Dialecto para PostgreSQL (opcional en versiones modernas de Spring Boot)
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: mysecretkeymysecretkeymysecretkeymysecretkey

server:
  port: 8080

